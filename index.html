<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Paramedic Coach Widget</title>
  <style>body { margin: 0; }</style>
</head>
<body>
<script>
(function () {
  'use strict';

  /* ═══════════════════════════════════════════════
     CONFIG — edit only these two lines
  ════════════════════════════════════════════════ */
  const WEBHOOK_URL = 'https://theparamediccoach.app.n8n.cloud/webhook/fa528f30-be0a-4ce1-9ad1-99e757218b8d';

  const LOGO_URL    = 'https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/themes/2150977857/settings_images/8CqGfJTcSb2vwSjs2kbC_Untitled_design_-_2022-06-25T171054.758.png';
  //  ^ Used in: header logo + bot message avatar.
  //    The gold bubble button at the bottom-right is NOT affected by this.
  //    To change it, just replace this URL with any image URL.

  const GREETING = [
    'Hello — I am The Paramedic Coach AI.',
    'I am here to help you crush the NREMT and your coursework.',
    'To get started, are you studying for **EMR**, **EMT**, **AEMT**, or **Paramedic**?'
  ];

  const SID = 'pc_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);

  /* ── Google Fonts ── */
  const gf = document.createElement('link');
  gf.rel = 'stylesheet';
  gf.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@700;800&display=swap';
  document.head.appendChild(gf);

  /* ── Styles ── */
  const style = document.createElement('style');
  style.textContent = `
    #pc-root {
      --gold: #C9922A; --gold-h: #b07d20;
      --gold-glow: rgba(201,146,42,0.28); --gold-light: rgba(201,146,42,0.12);
      --navy: #0f1117; --bg: #ffffff; --bg-alt: #f3f3f3;
      --bg-bot: #efefef; --bg-user: #C9922A;
      --text: #1a1a1a; --text-dim: #888; --border: #e2e2e2;
      --r: 18px; --font: 'Inter',system-ui,sans-serif;
      --font-d: 'Barlow Condensed',sans-serif;
    }
    #pc-tooltip {
      position:fixed; bottom:100px; right:26px;
      background:var(--navy); color:#fff;
      font-family:var(--font); font-size:12.5px; font-weight:500;
      padding:7px 13px; border-radius:20px; white-space:nowrap;
      box-shadow:0 4px 16px rgba(0,0,0,.18);
      z-index:2147483646; pointer-events:none;
      opacity:1; transition:opacity .25s ease;
      border:1px solid rgba(255,255,255,.07);
    }
    #pc-tooltip::after {
      content:''; position:absolute; bottom:-6px; right:22px;
      width:0; height:0;
      border-left:6px solid transparent; border-right:6px solid transparent;
      border-top:6px solid var(--navy);
    }
    #pc-tooltip.hidden { opacity:0; }

    #pc-bubble-btn {
      position:fixed; bottom:26px; right:26px;
      width:60px; height:60px; border-radius:50%;
      background:var(--gold); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 6px 24px var(--gold-glow),0 2px 8px rgba(0,0,0,.3);
      transition:transform .2s ease,box-shadow .2s ease;
      z-index:2147483646;
      animation:pc-ring 3.5s ease-in-out infinite;
    }
    #pc-bubble-btn:hover { transform:scale(1.08); box-shadow:0 10px 32px var(--gold-glow),0 2px 8px rgba(0,0,0,.3); animation:none; }
    @keyframes pc-ring {
      0%,100% { box-shadow:0 0 0 0 rgba(201,146,42,.45),0 6px 24px var(--gold-glow); }
      60%      { box-shadow:0 0 0 10px rgba(201,146,42,0),0 6px 24px var(--gold-glow); }
    }
    #pc-bubble-btn .pc-ico-chat  { display:flex; }
    #pc-bubble-btn .pc-ico-close { display:none; }
    #pc-bubble-btn.open .pc-ico-chat  { display:none; }
    #pc-bubble-btn.open .pc-ico-close { display:flex; }

    #pc-win {
      position:fixed; bottom:104px; right:26px;
      width:420px; height:620px;
      background:var(--bg); border-radius:20px;
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 0 0 1px rgba(201,146,42,.08),0 28px 70px rgba(0,0,0,.18),0 0 60px rgba(201,146,42,.06);
      display:flex; flex-direction:column; overflow:hidden;
      z-index:2147483645;
      transform:scale(.93) translateY(14px); opacity:0; pointer-events:none;
      transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .22s ease;
      font-family:var(--font);
    }
    #pc-win.open { transform:scale(1) translateY(0); opacity:1; pointer-events:all; }

    #pc-header {
      display:flex; align-items:center; gap:11px;
      padding:12px 16px;
      background:var(--navy);
      border-bottom:2px solid var(--gold);
      flex-shrink:0;
    }
    .pc-hdr-logo { width:36px; height:36px; flex-shrink:0; border-radius:6px; overflow:hidden; background:transparent; }
    .pc-hdr-logo img { width:100%; height:100%; object-fit:contain; display:block; }
    .pc-hdr-text { flex:1; min-width:0; }
    .pc-hdr-name { font-family:var(--font-d); font-size:13.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#fff; line-height:1.1; }
    .pc-hdr-name em { font-style:normal; color:var(--gold); }
    .pc-hdr-status { display:flex; align-items:center; gap:5px; margin-top:3px; }
    .pc-dot { width:6px; height:6px; border-radius:50%; background:#3ecf6b; box-shadow:0 0 5px rgba(62,207,107,.7); animation:pc-blink 2.8s ease-in-out infinite; flex-shrink:0; }
    @keyframes pc-blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .pc-hdr-status span { font-size:10.5px; color:rgba(255,255,255,.38); letter-spacing:.02em; }
    .pc-close-btn { background:none; border:none; cursor:pointer; color:rgba(255,255,255,.35); padding:4px; border-radius:6px; display:flex; align-items:center; transition:color .15s; flex-shrink:0; }
    .pc-close-btn:hover { color:#fff; }

    #pc-feed { flex:1; overflow-y:auto; overflow-x:hidden; padding:16px 14px 8px; background:var(--bg); scroll-behavior:smooth; }
    #pc-feed::-webkit-scrollbar { width:3px; }
    #pc-feed::-webkit-scrollbar-track { background:transparent; }
    #pc-feed::-webkit-scrollbar-thumb { background:rgba(201,146,42,.3); border-radius:3px; }

    .pc-row { display:flex; align-items:flex-end; gap:7px; margin-bottom:9px; animation:pc-in .2s ease forwards; }
    @keyframes pc-in { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .pc-row.bot  { justify-content:flex-start; }
    .pc-row.user { justify-content:flex-end; }

    /* Bot avatar — image-based */
    .pc-msg-av { width:26px; height:26px; flex-shrink:0; margin-bottom:2px; border-radius:5px; overflow:hidden; background:var(--navy); }
    .pc-msg-av img { width:100%; height:100%; object-fit:contain; display:block; }

    .pc-bub { max-width:82%; padding:9px 13px; font-size:13.5px; font-weight:400; line-height:1.65; word-break:break-word; }
    .pc-row.bot .pc-bub  { background:var(--bg-bot); color:var(--text); border-radius:var(--r) var(--r) var(--r) 4px; }
    .pc-row.user .pc-bub { background:var(--bg-user); color:#fff; border-radius:var(--r) var(--r) 4px var(--r); }

    .pc-bub p{margin:0 0 6px} .pc-bub p:last-child{margin:0}
    .pc-bub strong{font-weight:600} .pc-bub em{font-style:italic;opacity:.85}
    .pc-bub code{font-family:monospace;font-size:12px;background:rgba(0,0,0,.07);padding:1px 4px;border-radius:3px}
    .pc-row.user .pc-bub code{background:rgba(0,0,0,.15)}
    .pc-bub pre{background:rgba(0,0,0,.06);border-radius:7px;padding:9px 11px;overflow-x:auto;margin:7px 0;font-size:12px;font-family:monospace}
    .pc-bub ul,.pc-bub ol{padding-left:18px;margin:5px 0} .pc-bub li{margin:3px 0}
    .pc-bub h1,.pc-bub h2,.pc-bub h3{font-family:var(--font-d);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin:9px 0 3px;line-height:1.2}
    .pc-bub h1{font-size:16px} .pc-bub h2{font-size:14px} .pc-bub h3{font-size:13px}
    .pc-bub blockquote{border-left:3px solid var(--gold);padding:3px 9px;margin:7px 0;opacity:.8;font-style:italic}
    .pc-bub hr{border:none;border-top:1px solid rgba(0,0,0,.1);margin:9px 0}
    .pc-callout{display:flex;gap:7px;align-items:flex-start;background:rgba(201,146,42,.1);border:1px solid rgba(201,146,42,.3);border-radius:7px;padding:7px 11px;margin:5px 0;font-size:13px}
    .pc-callout i{font-style:normal;flex-shrink:0;margin-top:1px}

    .pc-typing-row{margin-bottom:9px;animation:pc-in .2s ease forwards}
    .pc-dots{display:flex;gap:4px;align-items:center;background:var(--bg-bot);padding:11px 14px;border-radius:var(--r) var(--r) var(--r) 4px}
    .pc-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);display:block;animation:pc-dot 1.1s ease-in-out infinite}
    .pc-dots span:nth-child(2){animation-delay:.18s} .pc-dots span:nth-child(3){animation-delay:.36s}
    @keyframes pc-dot{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-5px);opacity:1}}

    .pc-stamp{text-align:center;font-size:10.5px;color:var(--text-dim);margin:2px 0 12px;letter-spacing:.04em}

    #pc-input-area{display:flex;align-items:flex-end;gap:9px;padding:10px 14px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
    #pc-input{flex:1;background:var(--bg-alt);border:1.5px solid var(--border);border-radius:11px;padding:10px 13px;font-family:var(--font);font-size:13.5px;font-weight:400;color:var(--text);line-height:1.5;resize:none;outline:none;min-height:42px;max-height:110px;overflow-y:auto;transition:border-color .18s,box-shadow .18s,background .18s}
    #pc-input::placeholder{color:#bbb}
    #pc-input:focus{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px var(--gold-light)}
    #pc-send{width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px var(--gold-glow);transition:background .18s,transform .14s,box-shadow .18s}
    #pc-send:hover:not(:disabled){background:var(--gold-h);box-shadow:0 6px 18px var(--gold-glow)}
    #pc-send:active:not(:disabled){transform:scale(.91)}
    #pc-send:disabled{background:#ccc;box-shadow:none;cursor:not-allowed}
    #pc-send svg{fill:#fff;width:15px;height:15px}

    @media (min-width:481px) and (max-width:900px) {
      #pc-win{width:400px !important;height:580px !important;right:16px !important;bottom:96px !important}
    }
    @media (max-width:480px) {
      #pc-win{bottom:0 !important;right:0 !important;left:0 !important;width:100% !important;height:88dvh !important;border-radius:22px 22px 0 0 !important}
      #pc-bubble-btn{bottom:18px;right:18px}
      #pc-tooltip{bottom:90px;right:18px}
    }
  `;
  document.head.appendChild(style);

  /* ── DOM ── */
  const root = document.createElement('div');
  root.id = 'pc-root';
  root.innerHTML = `
    <div id="pc-win" role="dialog" aria-label="Paramedic Coach AI">
      <div id="pc-header">
        <div class="pc-hdr-logo">
          <img src="${LOGO_URL}" alt="The Paramedic Coach" onerror="this.style.display='none'"/>
        </div>
        <div class="pc-hdr-text">
          <div class="pc-hdr-name">Paramedic Coach <em>AI</em></div>
          <div class="pc-hdr-status"><span class="pc-dot"></span><span>NREMT Study Assistant</span></div>
        </div>
        <button class="pc-close-btn" id="pc-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="pc-feed"></div>
      <div id="pc-input-area">
        <textarea id="pc-input" placeholder="Ask about protocols, mnemonics, scenarios..." rows="1" aria-label="Message"></textarea>
        <button id="pc-send" aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/></svg>
        </button>
      </div>
    </div>

    <div id="pc-tooltip">Paramedic Coach AI — ask anything. 👋</div>

    <button id="pc-bubble-btn" aria-label="Open chat">
      <span class="pc-ico-chat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </span>
      <span class="pc-ico-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </span>
    </button>
  `;
  document.body.appendChild(root);

  /* ── Refs & state ── */
  const win=document.getElementById('pc-win'), feed=document.getElementById('pc-feed'),
        input=document.getElementById('pc-input'), sendBtn=document.getElementById('pc-send'),
        bubbleBtn=document.getElementById('pc-bubble-btn'), closeBtn=document.getElementById('pc-close'),
        tooltip=document.getElementById('pc-tooltip');
  let isOpen=false, busy=false, started=false;

  function open() { isOpen=true; win.classList.add('open'); bubbleBtn.classList.add('open'); tooltip.classList.add('hidden'); input.focus(); if(!started){started=true;boot();} }
  function close() { isOpen=false; win.classList.remove('open'); bubbleBtn.classList.remove('open'); tooltip.classList.remove('hidden'); }

  bubbleBtn.addEventListener('click', () => isOpen ? close() : open());
  closeBtn.addEventListener('click', close);

  function boot() {
    addStamp();
    GREETING.forEach((t,i) => setTimeout(() => addBubble('bot', md(t)), i*600));
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
  input.addEventListener('input', () => { input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,110)+'px'; });

  async function send() {
    const text=input.value.trim(); if(!text||busy) return;
    addBubble('user',esc(text)); input.value=''; input.style.height='auto';
    setBusy(true); const tr=addTyping();
    try {
      const res=await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chatInput:text,sessionId:SID,action:'sendMessage'})});
      tr.remove(); if(!res.ok) throw new Error('HTTP '+res.status);
      const data=await res.json();
      const reply=(Array.isArray(data)?(data[0]?.output??data[0]?.text??data[0]?.message):undefined)??data?.output??data?.text??data?.message??'Response received but format was unexpected.';
      addBubble('bot',md(reply));
    } catch(err) { tr.remove(); addBubble('bot','<em>Connection issue — please try again in a moment.</em>'); console.error('[PC]',err); }
    setBusy(false);
  }

  function makeAvatar() {
    const av=document.createElement('div'); av.className='pc-msg-av';
    const img=document.createElement('img'); img.src=LOGO_URL; img.alt='AI';
    img.onerror=function(){this.style.display='none';};
    av.appendChild(img); return av;
  }

  function addBubble(role,html) {
    const row=document.createElement('div'); row.className='pc-row '+role;
    if(role==='bot') row.appendChild(makeAvatar());
    const b=document.createElement('div'); b.className='pc-bub'; b.innerHTML=html;
    row.appendChild(b); feed.appendChild(row); scrollDown(); return row;
  }

  function addTyping() {
    const row=document.createElement('div'); row.className='pc-row bot pc-typing-row';
    row.appendChild(makeAvatar());
    const p=document.createElement('div'); p.className='pc-dots'; p.innerHTML='<span></span><span></span><span></span>';
    row.appendChild(p); feed.appendChild(row); scrollDown(); return row;
  }

  function addStamp() {
    const el=document.createElement('div'); el.className='pc-stamp';
    el.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    feed.appendChild(el);
  }

  function setBusy(v){busy=v;sendBtn.disabled=v;input.disabled=v;}
  function scrollDown(){requestAnimationFrame(()=>{feed.scrollTop=feed.scrollHeight;});}

  function md(raw) {
    let s=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s=s.replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`);
    s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>'); s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>'); s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
    s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>'); s=s.replace(/^---$/gm,'<hr>');
    s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>'); s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\*(.+?)\*/g,'<em>$1</em>'); s=s.replace(/__(.+?)__/g,'<strong>$1</strong>'); s=s.replace(/_([^_\n]+)_/g,'<em>$1</em>');
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/<strong>Warning:<\/strong>\s*(.+)/g,'<div class="pc-callout"><i>⚠</i><span>$1</span></div>');
    s=s.replace(/(\n[-*•] [^\n]+)\n\n(?=[-*•] )/g,'$1\n'); s=s.replace(/(\n\d+\. [^\n]+)\n\n(?=\d+\. )/g,'$1\n');
    s=s.replace(/((?:^[-*•] .+\n?)+)/gm,m=>{const items=m.trim().split('\n').map(l=>`<li>${l.replace(/^[-*•] /,'').trim()}</li>`).join('');return `<ul>${items}</ul>`;});
    s=s.replace(/((?:^\d+\. .+\n?)+)/gm,m=>{const lines=m.trim().split('\n');const start=lines[0].match(/^(\d+)\./)?.[1]||'1';const items=lines.map(l=>`<li>${l.replace(/^\d+\. /,'').trim()}</li>`).join('');return `<ol start="${start}">${items}</ol>`;});
    s=s.split(/\n{2,}/).map(block=>{block=block.trim();if(!block)return '';if(/^<(h[1-3]|ul|ol|pre|blockquote|hr|div)/.test(block))return block;return `<p>${block.replace(/\n/g,'<br>')}</p>`;}).join('');
    return s;
  }

  function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

})();
</script>
</body>
</html>
